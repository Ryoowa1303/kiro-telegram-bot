name: Bug report
description: Report a problem with the bot
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version (node -v)
    validations:
      required: true
  - type: input
    id: kiro
    attributes:
      label: Kiro CLI version (kiro-cli --version)
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: From logs/kiro-telegram-bot.log. REDACT your token and any secrets.
      render: shell
